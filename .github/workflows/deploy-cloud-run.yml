name: Deploy to Cloud Run

on:
  workflow_run:
    workflows: [CI]
    branches: [main]
    types: [completed]

permissions:
  contents: read
  id-token: write

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Build and deploy
    runs-on: ubuntu-latest
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    timeout-minutes: 20

    env:
      REGION: us-central1
      SERVICE: rlhf-feedback-loop
      IMAGE: us-central1-docker.pkg.dev/${{ secrets.GCP_PROJECT_ID }}/rlhf-api/rlhf-api

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.workflow_run.head_sha }}

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ secrets.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: gcloud auth configure-docker us-central1-docker.pkg.dev --quiet

      - name: Build and push Docker image
        run: |
          docker build \
            --tag "$IMAGE:${{ github.event.workflow_run.head_sha }}" \
            --tag "$IMAGE:latest" \
            --cache-from "$IMAGE:latest" \
            --build-arg BUILDKIT_INLINE_CACHE=1 \
            .
          docker push "$IMAGE:${{ github.event.workflow_run.head_sha }}"
          docker push "$IMAGE:latest"
        env:
          DOCKER_BUILDKIT: "1"

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE" \
            --image "$IMAGE:${{ github.event.workflow_run.head_sha }}" \
            --region "$REGION" \
            --platform managed \
            --allow-unauthenticated \
            --memory 512Mi \
            --cpu 1 \
            --min-instances 0 \
            --max-instances 10 \
            --set-secrets \
              STRIPE_SECRET_KEY=STRIPE_SECRET_KEY:latest,\
              STRIPE_WEBHOOK_SECRET=STRIPE_WEBHOOK_SECRET:latest,\
              STRIPE_PRICE_ID=STRIPE_PRICE_ID:latest,\
              GITHUB_MARKETPLACE_WEBHOOK_SECRET=GITHUB_MARKETPLACE_WEBHOOK_SECRET:latest,\
              RLHF_API_KEY=RLHF_API_KEY:latest \
            --quiet

      - name: Verify deployment health
        run: |
          SERVICE_URL=$(gcloud run services describe "$SERVICE" \
            --region "$REGION" \
            --format "value(status.url)")
          echo "Service URL: $SERVICE_URL"
          curl --fail --silent --show-error --retry 5 --retry-delay 5 \
            "$SERVICE_URL/health"
          echo "Health check passed."
